<!-- dashbrd.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IITA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>

  <!-- Firebase Config -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDbNz-RNef9HTz1QxqTF4SGdSlOd7zRCNE",
      authDomain: "iitapro.firebaseapp.com",
      projectId: "iitapro",
      storageBucket: "iitapro.appspot.com",
      messagingSenderId: "390594034949",
      appId: "1:390594034949:web:a9560d8ab874addb654b6c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <!-- Header Section -->
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center space-x-4">
        <img src="images/iita.jpeg" alt="IITA Logo" class="w-12 h-12 rounded-full border" />
        <h1 id="userName" class="text-2xl font-bold text-green-700">Welcome!</h1>
      </div>
      <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</button>
    </div>

    <!-- Dashboard Links -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <a href="logbook.html" class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
        <h2 class="text-xl font-semibold text-green-700">New Logbook Entry</h2>
        <p class="text-sm text-gray-600 mt-2">Fill in your daily activities.</p>
      </a>

      <a href="entries.html" class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
        <h2 class="text-xl font-semibold text-green-700">My Entries</h2>
        <p class="text-sm text-gray-600 mt-2">Review all your submissions.</p>
      </a>

      <a href="report.html" class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
        <h2 class="text-xl font-semibold text-green-700">Generate Report</h2>
        <p class="text-sm text-gray-600 mt-2">Download your logbook as PDF.</p>
      </a>
    </div>
  </div>

  <!-- Firebase Logic -->
  <script>
    // Check authentication state
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const uid = user.uid;

      try {
        const userDoc = await db.collection("users").doc(uid).get();

        if (userDoc.exists) {
          const userData = userDoc.data();
          const userName = userData.name || "User";

          document.getElementById("userName").textContent = `Welcome, ${userName}`;
        } else {
          document.getElementById("userName").textContent = "Welcome! (no profile)";
          console.warn("User document not found in Firestore.");
        }
      } catch (error) {
        console.error("Error fetching user profile:", error);
        document.getElementById("userName").textContent = "Welcome!";
      }
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      auth.signOut().then(() => {
        window.location.href = "login.html";
      });
    });
  </script>
</body>
</html>
