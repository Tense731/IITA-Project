<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logbook Entries</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDbNz-RNef9HTz1QxqTF4SGdSlOd7zRCNE",
      authDomain: "iitapro.firebaseapp.com",
      projectId: "iitapro",
      storageBucket: "iitapro.appspot.com",
      messagingSenderId: "390594034949",
      appId: "1:390594034949:web:a9560d8ab874addb654b6c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
</head>

<body class="bg-gray-100 min-h-screen p-4">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow-md">
    <h2 class="text-2xl font-bold text-green-700 mb-6 text-center">My Logbook Entries</h2>

    <div class="overflow-x-auto">
      <table class="min-w-full bg-white border border-gray-300">
        <thead>
          <tr class="bg-green-700 text-white">
            <th class="py-2 px-4 border-b">Date</th>
            <th class="py-2 px-4 border-b">Activity</th>
            <th class="py-2 px-4 border-b">Hours</th>
          </tr>
        </thead>
        <tbody id="entriesTable" class="text-gray-700 text-sm">
          <!-- Entries will be inserted here -->
        </tbody>
      </table>
    </div>
  </div>


  <script>
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const entriesTable = document.getElementById("entriesTable");

      try {
        const snapshot = await db.collection("logbook")
          .doc(user.uid)
          .collection("entries")
          .orderBy("timestamp", "desc")
          .get();

        if (snapshot.empty) {
          entriesTable.innerHTML = `<tr><td colspan="3" class="text-center py-4">No entries found.</td></tr>`;
        } else {
          snapshot.forEach(doc => {
            const { date, activity, hours } = doc.data();

            const row = `
              <tr>
                <td class="border px-4 py-2">${date}</td>
                <td class="border px-4 py-2">${activity}</td>
                <td class="border px-4 py-2">${hours}</td>
              </tr>
            `;

            entriesTable.innerHTML += row;
          });
        }
      } catch (error) {
        console.error("Error fetching entries:", error);
        entriesTable.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-red-600">Error loading entries.</td></tr>`;
      }
    });
  </script>
</body>
</html>
