<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IITA Logbook Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase App (Core SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>

<!-- Firebase Auth SDK -->
<script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>

<!-- Your Firebase Config -->
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDbNz-RNef9HTz1QxqTF4SGdSlOd7zRCNE",
    authDomain: "iitapro.firebaseapp.com",
    projectId: "iitapro",
    storageBucket: "iitapro.firebasestorage.app",
    messagingSenderId: "390594034949",
    appId: "1:390594034949:web:a9560d8ab874addb654b6c"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
</script>

</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-2xl shadow-lg">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-green-700">IITA Digital Logbook</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to continue</p>
    </div>

    <form class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email or Staff ID</label>
        <input type="text" id="email" name="email" required class="w-full px-4 py-2 mt-1 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" name="password" required class="w-full px-4 py-2 mt-1 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center">
          <input type="checkbox" class="mr-2"> Remember me
        </label>
        <a href="#" class="text-green-600 hover:underline">Forgot Password?</a>
      </div>

      <button type="submit" class="w-full py-2 text-white bg-green-700 rounded-lg hover:bg-green-800 transition duration-200">
        Sign In
      </button>
    </form>

    <p class="text-sm text-center text-gray-600">
      Don’t have an account?
      <a href="signup.html" class="text-green-600 hover:underline">Sign up here</a>
    </p>
  </div>
  <script>
  const form = document.querySelector("form");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    const email = form.email.value;
    const password = form.password.value;

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        alert("Login successful!");
        window.location.href = "dashboard.html"; // redirect
      })
      .catch((error) => {
        alert("Error: " + error.message);
      });
  });
</script>

</body>
</html>
