<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>

  <script>
     const firebaseConfig = {
    apiKey: "AIzaSyDbNz-RNef9HTz1QxqTF4SGdSlOd7zRCNE",
    authDomain: "iitapro.firebaseapp.com",
    projectId: "iitapro",
    storageBucket: "iitapro.firebasestorage.app",
    messagingSenderId: "390594034949",
    appId: "1:390594034949:web:a9560d8ab874addb654b6c"
  };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const adminEmails = ["admin1@example.com", "supervisor@iita.org"]; // Change to your real admin emails
  </script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-green-700">Admin Dashboard</h1>
      <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</button>
    </div>
<div class="mb-4">
  <input
    type="text"
    id="searchInput"
    placeholder="Search by user email or date..."
    class="w-full sm:w-1/3 px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-green-600"
  />
</div>

    <div class="overflow-x-auto bg-white rounded-lg shadow">
      <table class="w-full text-left border-collapse">
        <thead class="bg-green-700 text-white text-sm">
          <tr>
            <th class="p-3">User</th>
            <th class="p-3">Date</th>
            <th class="p-3">Time In</th>
            <th class="p-3">Time Out</th>
            <th class="p-3">Activities</th>
          </tr>
        </thead>
        <tbody id="adminTable" class="text-sm text-gray-700">
          <!-- Entries will load here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
  let currentUser = null;
  let allEntries = [];

  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    currentUser = user;
    if (!adminEmails.includes(user.email)) {
      alert("Access denied. You are not an admin.");
      window.location.href = "dashboard.html";
      return;
    }

    loadAllEntries();
  });

  function loadAllEntries() {
    db.collection("logbook_entries")
      .orderBy("date", "desc")
      .get()
      .then(snapshot => {
        allEntries = [];
        snapshot.forEach(doc => {
          allEntries.push(doc.data());
        });
        renderTable(allEntries);
      });
  }

  function renderTable(data) {
    const table = document.getElementById("adminTable");
    table.innerHTML = "";
    data.forEach(d => {
      const row = `
        <tr class="border-b">
          <td class="p-3">${d.email}</td>
          <td class="p-3">${d.date}</td>
          <td class="p-3">${d.timeIn}</td>
          <td class="p-3">${d.timeOut}</td>
          <td class="p-3">${d.activities}</td>
        </tr>`;
      table.innerHTML += row;
    });
  }

  // 🔍 Search Logic
  document.getElementById("searchInput").addEventListener("input", function () {
    const query = this.value.toLowerCase();
    const filtered = allEntries.filter(d =>
      d.email.toLowerCase().includes(query) || d.date.includes(query)
    );
    renderTable(filtered);
  });
</script>

  
</body>
</html>
